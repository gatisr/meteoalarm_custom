name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-with-hassfest:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: home-assistant/actions/hassfest@master
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_test.txt
    - name: Run tests
      run: |
        pytest tests/
  card:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Build the Lovelace card
      working-directory: card
      run: |
        npm ci
        npm run build
    - name: Fail if the committed bundle is stale
      run: git diff --exit-code custom_components/meteoalarm_custom/frontend/meteoalarm-card.js
